services:
  db:
    image: postgres:16-alpine
    container_name: cloudservice-db
    environment:
      POSTGRES_DB: cloudservice
      POSTGRES_USER: cloudservice
      POSTGRES_PASSWORD: cloudservice
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudservice -d cloudservice"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudservice-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cloudservice
      DB_USERNAME: cloudservice
      DB_PASSWORD: cloudservice
      APP_STORAGE_ROOT: /app/storage
    ports:
      - "8080:8080"
    volumes:
      - app-storage:/app/storage

volumes:
  postgres-data:
  app-storage:
